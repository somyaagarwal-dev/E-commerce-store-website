<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
  
    <title>Shop Ease</title>
</head>
<body>
    <!-- Header -->
     <Header>
        <h1>Shop Ease</h1>
        <p>Your One-Stop Tech Store</p>
        <nav>
            <a href="index.html">Home</a>
            <a href="cart.html">Cart</a>
            <a href="login.html">Login</a>
            <a href="Register.html">Register</a>
            <p>Cart Items: <span id="cart-count">0</span></p>
              
        </nav>
     </Header>
     <hr>
     <!-- Hero Section-->
      <section class="hero">
    <h2>Welcome to ShopEase</h2>
    <p>Find the best tech products at affordable prices</p>
</section>
<section class="search-section">

    <div class="search-box">

        <span>🔍</span>

        <input
            type="text"
            id="searchInput"
            placeholder="Search products..."
            onkeyup="searchProducts()">

        <button onclick="startVoiceSearch()">🎤</button>

    </div>

    <p id="no-results" style="display:none;">
        No products found 😢
    </p>

</section>

         <hr>
         <!--Product listings-->
         <section>
            <h2>Featured Products</h2>
            <div class="products" id="products-container">
</div>
         </section>
         
          <hr>
          <footer>
            <P> &copy; 2026Shop Ease. All Rights Reserved </P>
          </footer>
          <script>

fetch("http://localhost:3000/products")
    .then(response => response.json())
    .then(data => {

        console.log(data);

    });

</script>
<script>

fetch("http://localhost:3000/products")
    .then(response => response.json())
    .then(data => {

        let container =
            document.getElementById("products-container");
console.log(container);
        data.forEach(product => {

            container.innerHTML += `
                <article class="products-card">

                    <img src="${product.image}" alt="${product.name}">

                    <h3>${product.name}</h3>

                    <p>Price: ₹${product.price}</p>

                    <a href="${product.detailsPage}">
                        <button>View Details</button>
                    </a>

                </article>
            `;
        });

    });

</script>
          <script src="script.js"></script>
</body>
</html>
